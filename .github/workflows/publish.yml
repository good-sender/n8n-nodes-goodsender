# Publishes this n8n community node to npm with provenance on every version tag push.
#
# Required by n8n for verified community nodes (provenance mandatory since 2026-05-01).
# Provenance lets anyone cryptographically verify the package was built by this exact
# workflow, from this exact repo and commit. Requires @n8n/node-cli >= 0.23.0.
#
# One-time setup — OIDC Trusted Publishing (recommended, no secrets):
#   npmjs.com -> the package -> Settings -> Publish access -> Trusted Publishers -> Add:
#     Repository owner: good-sender
#     Repository name:  n8n-nodes-goodsender
#     Workflow name:    publish.yml
#   Leave NPM_TOKEN unset; GitHub's OIDC token is used instead.
#
# Token fallback: set an NPM_TOKEN repo secret (granular, read+write to this package).
#
# Release process — run locally:
#   npm run release
# This lints, builds, prompts for a version bump, commits, tags, and pushes —
# which triggers this workflow to publish.
name: Publish

on:
  push:
    tags:
      - '*.*.*'
      - 'v*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write # required to mint an OIDC token for npm provenance
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Idempotency guard: if this version is already on npm (e.g. a re-run or a
      # stale tag), skip publishing instead of failing with "cannot publish over".
      - name: Check if version already published
        id: check
        run: |
          V=$(node -p "require('./package.json').version")
          if npm view "n8n-nodes-goodsender@$V" version >/dev/null 2>&1; then
            echo "n8n-nodes-goodsender@$V is already on npm — skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Release
        if: steps.check.outputs.skip == 'false'
        # n8n-node release builds, lints, and publishes with --provenance.
        # OIDC: leave NPM_TOKEN unset. Token: set NPM_TOKEN and it is used below.
        run: |
          [ -n "$NPM_TOKEN" ] && npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
